name: 📱 微信公众号每周图片精选

on:
  schedule:
    # 每周六早上8点 (北京时间 = UTC+8)
    - cron: '0 0 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: '发布模式'
        required: false
        default: 'email'
        type: choice
        options:
          - email
          - manual
          - api

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  weekly-wechat:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 安装 gallery-dl
        run: |
          pip install gallery-dl

      - name: 🔑 配置 Pixiv 登录
        if: env.PIXIV_USERNAME != '' && env.PIXIV_PASSWORD != ''
        env:
          PIXIV_USERNAME: ${{ secrets.PIXIV_USERNAME }}
          PIXIV_PASSWORD: ${{ secrets.PIXIV_PASSWORD }}
        run: |
          mkdir -p ~/.gallery-dl
          python3 scripts/setup_gallery_dl.py

      - name: 🔍 抓取图片
        env:
          PIXIV_USERNAME: ${{ secrets.PIXIV_USERNAME }}
          PIXIV_PASSWORD: ${{ secrets.PIXIV_PASSWORD }}
          PIXIV_COOKIE: ${{ secrets.PIXIV_COOKIE }}
          WALLHAVEN_API_KEY: ${{ secrets.WALLHAVEN_API_KEY }}
        run: |
          python3 scripts/fetch_images.py \
            --wallpaper-count 20 \
            --anime-count 15 \
            --avatar-count 25 \
            --minecraft-count 8

      - name: 🎯 审美评分
        run: |
          python3 scripts/score_and_filter.py \
            --input fetch_results.json \
            --output scored_results.json

      - name: 📋 精选50张
        run: |
          python3 scripts/select_for_wechat.py \
            --input scored_results.json \
            --output wechat_selection.json \
            --landscape 15 \
            --anime 10 \
            --avatar 20 \
            --minecraft 5

      - name: 📝 生成文章
        run: |
          python3 scripts/generate_wechat_article.py \
            --input wechat_selection.json \
            --output wechat_article.html \
            --mode manual

      - name: 📱 生成预览页
        run: |
          python3 scripts/publish_to_wechat.py \
            --selection wechat_selection.json \
            --article wechat_article.html \
            --mode manual \
            --output-dir docs/wechat-preview

      - name: 📧 发送邮件
        if: env.SENDER_EMAIL != '' && env.SENDER_PASSWORD != ''
        env:
          SMTP_SERVER: smtp.163.com
          SMTP_PORT: 465
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python3 scripts/publish_to_wechat.py \
            --selection wechat_selection.json \
            --article wechat_article.html \
            --mode email

      - name: 🚀 提交 & 推送
        run: |
          git config user.name "aesthetic-lens-bot"
          git config user.email "bot@aesthetic-lens.dev"
          git add docs/ logs/
          git diff --staged --quiet || git commit -m "📱 $(date +%Y-%m-%d) 微信周刊更新"
          git push

  deploy-preview:
    needs: weekly-wechat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

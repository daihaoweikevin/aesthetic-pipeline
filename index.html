<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绝美图片库 — Aesthetic Lens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f8f6f2; color: #2c2c2c;
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
  .message {
    padding: 60px 30px;
  }
  .message h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.08em; color: #1a1a1a; }
  .message p { font-size: 1rem; color: #999; margin-top: 16px; font-weight: 300; line-height: 1.8; }
  .message .icon { font-size: 4rem; margin-bottom: 20px; }
  .hint { margin-top: 40px; font-size: 0.8rem; color: #ccc; }
</style>
</head>
<body>
<div class="message">
  <div class="icon">🌸</div>
  <h1>绝美图片库</h1>
  <p>Aesthetic Lens Pipeline 正在筹建中</p>
  <p>首次自动采集运行后，绝美图片将在此呈现</p>
  <div class="hint">由 GitHub Actions 每周自动更新</div>
</div>
</body>
</html>
